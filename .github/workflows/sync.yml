name: Sync common rules to consumers

# AGENTS_COMMON.md / shared/** / tasks/** / sync-deletions.txt / 配布スクリプトを変更して
# main に入ると、各 consumer へ同期PRを自動生成する。
#
# あわせて cron（1日1回）でも全 consumer へ再適用する（ドリフトの自己修復）。
# push 起点だけだと、consumer 側でマーカー区間や配布ファイルが手編集された場合に
# 「次に ai-ops を変更するまで」ドリフトが残り続ける（エージェントが古い/改変された
# ルールを読んで従ってしまう）。適用スクリプトは冪等で、差分が無ければ PR は立たない。
# 既定の GITHUB_TOKEN は他リポジトリに書けないため、複数リポジトリ権限の PAT を
# Secret OPS_SYNC_TOKEN（Contents: RW / Pull requests: RW）で渡すこと。
#
# MERGE_MODE — 同期PRの扱い（内容は ai-ops の main マージ時点でレビュー済みなので、
# consumer 側での再レビューは原則不要という設計）:
#   direct : 生成後に即マージする（完全自動。consumer main に直結する）
#   auto   : GitHub の auto-merge を有効化する（consumer 側に branch protection＋
#            required checks が必要。無ければ失敗して PR は open のまま＝手動マージ）
#   off    : 何もしない（従来どおり手動マージ）

on:
  push:
    branches: [main]
    paths:
      - AGENTS_COMMON.md
      - consumers.txt
      - sync-deletions.txt
      - scripts/apply-common.mjs
      - scripts/apply-shared.mjs
      - scripts/apply-entrypoints.mjs
      - shared/**
      - tasks/**
      - .github/workflows/sync.yml
  schedule:
    - cron: '47 19 * * *' # 1日1回（JST 早朝）の再適用＝consumer 側手編集ドリフトの自己修復
  workflow_dispatch:

env:
  MERGE_MODE: direct

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      consumers: ${{ steps.read.outputs.list }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        # consumers.txt から # と空行を除き、JSON 配列にしてマトリクスへ渡す
        run: |
          list=$(grep -vE '^[[:space:]]*(#|$)' consumers.txt | jq -R . | jq -cs .)
          echo "list=$list" >> "$GITHUB_OUTPUT"

  sync:
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ needs.prepare.outputs.consumers != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        consumer: ${{ fromJson(needs.prepare.outputs.consumers) }}
    steps:
      - name: Checkout ai-ops (source of truth)
        uses: actions/checkout@v5

      - name: Checkout consumer
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.consumer }}
          token: ${{ secrets.OPS_SYNC_TOKEN }}
          path: consumer

      - name: Set up log directory
        run: |
          mkdir -p /tmp/ci-logs
          cat > /tmp/ci-logs/summary.md << EOF
          # Sync: ${{ matrix.consumer }}
          - Run: ${{ github.run_id }}
          - Triggered by: ${{ github.event_name }}
          - Ref: ${{ github.sha }}
          - Started: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          EOF

      - name: Apply common block to consumer AGENTS.md
        run: node scripts/apply-common.mjs AGENTS_COMMON.md consumer/AGENTS.md 2>&1 | tee /tmp/ci-logs/apply-common.log

      - name: Wire agent entrypoints (CLAUDE.md / GEMINI.md -> AGENTS.md)
        run: node scripts/apply-entrypoints.mjs consumer 2>&1 | tee /tmp/ci-logs/apply-entrypoints.log

      - name: Apply shared files / tasks / deletions to consumer
        run: node scripts/apply-shared.mjs . consumer "${{ matrix.consumer }}" 2>&1 | tee /tmp/ci-logs/apply-shared.log

      - name: Create or update sync PR
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.OPS_SYNC_TOKEN }}
          path: consumer
          base: main
          branch: ai-ops/sync-common
          delete-branch: true
          commit-message: 'chore: sync common rules from ai-ops'
          title: 'chore: ai-ops 共通ルールを同期'
          body: |
            ai-ops（単一の正）に追従して、次を更新します:

            - `AGENTS.md` の共通ブロック（`<!-- AI-OPS:COMMON START -->` 〜 `END`）
            - `CLAUDE.md` / `GEMINI.md` → `AGENTS.md` の入口 symlink（各エージェントに AGENTS.md を読ませる）
            - `shared/` 由来の配布ファイル（`docs/` の共通 doc・composite action 等）
            - このリポジトリ宛のタスク（`.ai-ops/tasks/`）
            - 撤去されたファイルの削除（`.ai-ops/sync-manifest.txt` 基準）

            このPRは ai-ops の sync workflow が自動生成しました。内容のレビューは ai-ops 側の
            マージ時に済んでいます。**同期対象のファイルは手で編集しないでください**
            （次回同期で上書きされます）。直す場合は `.ai-ops/outbox/` 提案で（→ `docs/outbox-proposal.md`）。

      - name: Merge sync PR (per MERGE_MODE)
        if: env.MERGE_MODE != 'off' && steps.create-pr.outputs.pull-request-url != ''
        env:
          GH_TOKEN: ${{ secrets.OPS_SYNC_TOKEN }}
        run: |
          url="${{ steps.create-pr.outputs.pull-request-url }}"
          if [ "$MERGE_MODE" = "direct" ]; then
            gh pr merge --squash "$url" \
              || echo "::warning::direct merge failed; PR left open: $url"
          else
            gh pr merge --auto --squash "$url" \
              || echo "::warning::auto-merge could not be enabled (consumer repo needs branch protection with required checks, or set MERGE_MODE: direct); PR left open: $url"
          fi

      - name: Record PR result
        if: always()
        run: |
          echo "- PR URL: ${{ steps.create-pr.outputs.pull-request-url }}" >> /tmp/ci-logs/summary.md
          echo "- PR Number: ${{ steps.create-pr.outputs.pull-request-number }}" >> /tmp/ci-logs/summary.md
          echo "- Merge mode: ${MERGE_MODE}" >> /tmp/ci-logs/summary.md
          echo "- Finished: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> /tmp/ci-logs/summary.md

      - name: Publish CI logs
        if: always()
        uses: ./.github/actions/publish-ci-logs
        with:
          source-dir: /tmp/ci-logs
          dest: sync/${{ matrix.consumer }}/latest
          history-dir: sync/${{ matrix.consumer }}/history
          retention-days: "30"
          run-id: ${{ github.run_id }}
          commit-message: "ci-logs: sync ${{ matrix.consumer }} (run ${{ github.run_id }})"
          token: ${{ secrets.OPS_SYNC_TOKEN }}
