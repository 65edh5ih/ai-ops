name: Notify ai-ops of outbox proposal

# .ai-ops/outbox/** に提案が push されたら、ai-ops に repository_dispatch を撃って
# 共通ルールの取り込み（collect-outbox）を即時起動する。consumer→ai-ops の上り経路の起点。
# 仕組み全体は ai-ops リポジトリの README を参照。

on:
  push:
    branches: [main]
    paths:
      - '.ai-ops/outbox/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize script logs directory
        run: mkdir -p logs/ci/scripts

      - name: Dispatch outbox-proposal to ai-ops
        env:
          TOKEN: ${{ secrets.OPS_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "OPS_DISPATCH_TOKEN is not set; cannot notify ai-ops." | tee logs/ci/scripts/notify-ai-ops.log >&2
            exit 1
          fi
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/65edh5ih/ai-ops/dispatches \
            -d '{"event_type":"outbox-proposal","client_payload":{"source_repo":"${{ github.repository }}","ref":"${{ github.ref }}","sha":"${{ github.sha }}"}}')
          echo "HTTP status: ${response:-<no response>}" | tee logs/ci/scripts/notify-ai-ops.log
          if [ "${response}" != "204" ]; then
            echo "::error::repository_dispatch to ai-ops failed (HTTP ${response:-<no response>})." | tee -a logs/ci/scripts/notify-ai-ops.log
            exit 1
          fi

      - name: Stage CI log snapshot
        if: always()
        run: |
          set -euo pipefail
          snap="logs/ci/_snapshot"
          rm -rf "$snap"; mkdir -p "$snap"
          while IFS= read -r f; do
            cp -f "$f" "$snap/$(basename "$f")"
          done < <(find logs/ci -mindepth 1 -maxdepth 2 -type f -not -path "logs/ci/_snapshot/*" 2>/dev/null)
          {
            echo "# notify-ai-ops run metadata"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "commit_sha=${GITHUB_SHA}"
            echo "trigger_event=${GITHUB_EVENT_NAME}"
            echo "actor=${GITHUB_ACTOR}"
            echo "ref=${GITHUB_REF_NAME}"
            echo "generated_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > "$snap/metadata.txt"

      - name: Publish logs to ci-logs branch
        if: always()
        uses: ./.github/actions/publish-ci-logs
        with:
          source-dir: logs/ci/_snapshot
          dest: notify-ai-ops/latest
          history-dir: notify-ai-ops/history
          retention-days: "30"
          run-id: ${{ github.run_id }}
          commit-message: "ci(logs): notify-ai-ops run ${{ github.run_id }}"
          token: ${{ github.token }}
